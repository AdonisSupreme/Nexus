id: SOP-F-005
class: F
title: Zeepay Payment Access Gateway Administration
severity: medium

services:
  - zeepay-payment-gateway
  - payment-processing
  - user-role-management
  - audit-trail-system

environments:
  - PROD

aliases:
  - Zeepay user administration
  - Payment gateway user management
  - E-pay system administration
  - Payment access gateway setup

checks:
  - "Verify Super Administrator creates System Administrator users"
  - "Confirm Super Administrator has highest privilege level"
  - "Validate System Administrators perform user and role management"
  - "Check Line Management approver available via User Access Form"
  - "Confirm Head of Digital Payments as business owner"
  - "Validate completed User Access Form"
  - "Verify approval by Line Manager"
  - "Confirm approval by Head of IT Department"
  - "Check Super Administrator availability"

recommended_actions:
  - "System access URL: http://192.168.0.236/epay/login#!"
  - "Access scope: AFC internal network only, internal processing modules"
  - "Access controls: Role-based access control"
  - "User creation authority: Only Super Administrator may create System Administrator users"
  - "User creation authority: System Administrators may manage standard users only"
  - "Delegation flow: Super Administrator → System Administrator → Standard Users"
  - "User management: Login using administrator credentials"
  - "User management: Navigate to: Profiles → Users"
  - "User management: Search user by surname (lowercase)"
  - "User management: Select user by clicking blue name"
  - "User management actions: Reset password (email notification sent)"
  - "User management actions: Lock account"
  - "User management actions: Unlock account"
  - "User management actions: Remove mandates"
  - "User management actions: Edit user information"
  - "User management actions: View change log"
  - "Role management: Navigate to: Profiles → Roles"
  - "Role management: Select role to update (e.g., Security Admin Approver)"
  - "Role management: Review assigned users and privileges"
  - "Role management: Modify permissions by selecting/deselecting privileges"
  - "Role management: Save changes"
  - "Holiday configuration: Navigate to: Holidays → Manage Holidays"
  - "Holiday configuration create: Set holiday date, select holiday type"
  - "Holiday configuration edit: Select existing holiday, click Edit Holiday, submit changes"
  - "Audit trail generation: Navigate to: Audit Trail"
  - "Audit trail generation: Search by specific user"
  - "Audit trail generation: Apply date or activity filters"
  - "Audit trail generation: Generate audit report"
  - "Audit trail generation: Export report in CSV format"
  - "Report generation: Navigate to: Reports"
  - "Report generation: Select report type from dropdown"
  - "Report generation: Set date parameters"
  - "Report generation: Select output format"
  - "Report generation: Click Generate"
  - "Verification: Password reset email successfully delivered"
  - "Verification: Role permissions function as configured"
  - "Verification: Holiday configurations applied correctly"
  - "Verification: Audit trail entries complete and searchable"

notes:
  - "Internal system only; no external access permitted"
  - "Email delivery is critical for password reset operations"
  - "Regular role and privilege reviews recommended"
  - "System provides comprehensive audit capabilities"
  - "Security controls: Super Administrator exclusive creation rights"
  - "Security controls: Email-based password reset mechanism"
  - "Security controls: Role-based permission enforcement"
  - "Security controls: Comprehensive audit trail logging"
  - "Security controls: Regular security and access reviews"
  - "Escalation path Level 1: System Administrator (routine administration)"
  - "Escalation path Level 2: Super Administrator (privilege or access issues)"
  - "Escalation path Level 3: Digital Payments Team (business impact)"
  - "Escalation path Level 4: Head ICT (security or systemic concerns)"
  - "Documentation: User Access Forms"
  - "Documentation: Role permission matrices"
  - "Documentation: Holiday configuration records"
  - "Documentation: Audit trail reports"
  - "Documentation: Security incident logs"
  - "Compliance requirements: Payment system security standards"
  - "Compliance requirements: User authentication requirements"
  - "Compliance requirements: Audit trail retention policies"
  - "Compliance requirements: Regular access reviews"