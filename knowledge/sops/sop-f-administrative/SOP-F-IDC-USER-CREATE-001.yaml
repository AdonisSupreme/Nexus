id: SOP-F-001
class: F
title: IDC User Account Creation and Access Management
severity: medium

services:
  - arx-authentication-system
  - idc-corebanking
  - user-profile-management
  - access-control-system

environments:
  - PROD
  - TEST

aliases:
  - IDC user account creation
  - ARX user administration
  - Core banking access management
  - User profile creation

checks:
  - "Verify ICT Operations Staff with ARX input rights available as inputter"
  - "Confirm ARX Authorizer profile available"
  - "Validate IDC Authorizer profile available"
  - "Check Line Management approver available"
  - "Confirm Risk Department approver available via User Access Form"
  - "Verify Head of respective department as business owner"
  - "Validate completed User Access Request Form signed by: Requesting User, Line Manager, Risk Department"
  - "Confirm User Role Matrix document available"
  - "Verify user profile requirements documented and approved"

recommended_actions:
  - "Phase 1 ARX user creation: Login to ARX with inputter profile"
  - "Phase 1 ARX user creation: Navigate to: Initiate → New User"
  - "Phase 1 ARX user creation: Enter user details: user_type: Bank, entity: AFCIDC, primary_authentication: Native, password: Default"
  - "Phase 1 ARX user creation: Submit user creation request"
  - "Phase 1 ARX user creation: Confirm success message displayed"
  - "Phase 2 ARX authorization: Login to ARX as ARX Authorizer"
  - "Phase 2 ARX authorization: Navigate to Pending Approvals"
  - "Phase 2 ARX authorization: Locate user creation request"
  - "Phase 2 ARX authorization: Validate details against User Access Form"
  - "Phase 2 ARX authorization: Approve request"
  - "Phase 3 IDC role assignment: Login to IDC with admin rights"
  - "Phase 3 IDC role assignment: Navigate to: Change User Role"
  - "Phase 3 IDC role assignment: Enter User ID"
  - "Phase 3 IDC role assignment: Change role from SUPER to approved role (per User Access Form)"
  - "Phase 3 IDC role assignment: Submit role change request"
  - "Phase 4 IDC authorization: Login to IDC as IDC Authorizer"
  - "Phase 4 IDC authorization: Navigate to: Authorisation → Non-Financial"
  - "Phase 4 IDC authorization: Review role change request"
  - "Phase 4 IDC authorization: Approve request"
  - "Login verification: Confirm user can log in successfully"
  - "Default password format primary: <first_4_chars_of_username><DDMMYYYY>"
  - "Default password format secondary: <first_4_chars_of_username><MMDDYYYY>"
  - "Default password example: username: NC040885, dob: 08-11-1997, primary: NC0408111997, secondary: NC0411081997"
  - "Post login verification: User is prompted to change password on first login"
  - "Post login verification: Password policy enforcement confirmed"

notes:
  - "Default SUPER role is temporary and must be changed immediately"
  - "Correct entity selection is critical (AFCIDC for IDC access)"
  - "Password reset may be required if default formats fail"
  - "User must comply with password policy upon first login"
  - "Security controls: Dual authorization enforced (ARX and IDC)"
  - "Security controls: User Access Form mandatory"
  - "Security controls: Role Matrix validation required"
  - "Security controls: Least privilege principle applied"
  - "Security controls: Mandatory password change on first login"
  - "Security controls: Password complexity and expiry enforced"
  - "Escalation path Level 1: ICT Operations (input or authorization issues)"
  - "Escalation path Level 2: IDC Support Team (role configuration issues)"
  - "Escalation path Level 3: Head ICT (policy exceptions)"
  - "Escalation path Level 4: Risk Department (compliance concerns)"
  - "Documentation: Approved User Access Request Form"
  - "Documentation: ARX user creation logs"
  - "Documentation: IDC role assignment logs"
  - "Documentation: Authorization records"
  - "Documentation: User access acknowledgement"
  - "Compliance requirements: Segregation of duties maintained"
  - "Compliance requirements: Least privilege enforced"
  - "Compliance requirements: Full audit trail available"
  - "Compliance requirements: Periodic access reviews scheduled"