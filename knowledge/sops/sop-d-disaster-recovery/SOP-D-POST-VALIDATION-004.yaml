rollback:
  - "Trigger rollback if critical data corruption detected"
  - "Trigger rollback if core banking transactions failing over 20%"
  - "Trigger rollback if authentication unavailable over 30 minutes"
  - "Trigger rollback if regulatory interfaces non-functional"
  - "Trigger rollback if performance degradation over 200%"
  - "Consider graduated rollback for partial service failures"
  - "Non-critical interface failures may be temporarily acceptable"
  - "Monitor performance issues before deciding on rollback"
  - "Base rollback decision on business impact assessment"
  - "Stop all DR services"
  - "Document reason for rollback"
  - "Communicate rollback to stakeholders"

notes:
  - "Comprehensive validation required before DR declaration"
  - "Involve business process owners in validation"
  - "Establish performance baselines during DR drills"
  - "Maintain detailed validation documentation"
  - "Regular DR testing improves efficiency"
  - "Coordinate with all teams for issue resolution"
  - "Critical success factors: All core banking transactions must process"
  - "Critical success factors: No data corruption or loss"
  - "Critical success factors: Performance within thresholds"
  - "Critical success factors: All external interfaces functional"
  - "Critical success factors: No critical system log errors"
  - "Certification signoff required from: System administrator, Database administrator, Application support lead, Business continuity manager, Head of ICT"